/* ══════════════════════════════════════════════════════
   대운 통합 오행 계산 (五柱法)

   대운 = 5번째 기둥 (월지의 연장선)
   ① 대운 천간: 억부 오행 계산에 포함 (가중치 = 월간과 동급, 10점)
   ② 대운 지지: 월지 보조 역할 (가중치 = 월지의 절반, 16점)
   ③ 원국 합·충 상태 재평가:
      - 원국에서 합·충이 상쇄(무효)된 경우, 대운 글자가 개입하면 활성화
      - 대운 지지가 원국의 충·합 한 쪽에 가담 → 잠든 변화가 깨어남
   ④ 대운 천간·지지가 원국 천간·지지와 새 합·충 생성
   ══════════════════════════════════════════════════════ */

// 원국 합·충의 상태를 분석 (어떤 지지가 합/충에 개입해 있는지)
function analyzeOriginalHapChung(s) {
  const jiList = s.map(p=>p.j);
  const ganList = s.map(p=>p.g);

  // 원국 합 참여 지지 인덱스 맵: jiIdx → {hapType, partner, hwEl}
  const hapMap = {};
  const chungMap = {};

  // 삼합 참여
  for(const {trio,hwEl} of SAMHAP){
    const pos=trio.map(j=>jiList.indexOf(j));
    if(!pos.every(p=>p>=0)) continue;
    pos.forEach(p=>{ hapMap[p]={type:'samhap',hwEl,priority:3}; });
  }
  // 반합 참여
  for(const {a,b,hwEl,hasWang} of BANHAP){
    const pa=jiList.indexOf(a),pb=jiList.indexOf(b);
    if(pa<0||pb<0) continue;
    const pri=hasWang?2.5:1.5;
    if(!hapMap[pa]||hapMap[pa].priority<pri) hapMap[pa]={type:'banhap',hwEl,hasWang,priority:pri,partner:pb};
    if(!hapMap[pb]||hapMap[pb].priority<pri) hapMap[pb]={type:'banhap',hwEl,hasWang,priority:pri,partner:pa};
  }
  // 육합
  for(const {a,b,hwEl} of YUKHAP){
    const pa=jiList.indexOf(a),pb=jiList.indexOf(b);
    if(pa<0||pb<0) continue;
    if(!hapMap[pa]) hapMap[pa]={type:'yukhap',hwEl,priority:2,partner:pb};
    if(!hapMap[pb]) hapMap[pb]={type:'yukhap',hwEl,priority:2,partner:pa};
  }
  // 충 참여
  for(const {a,b,type,firedEl} of JIJI_CHUNG){
    const ia=jiList.indexOf(a),ib=jiList.indexOf(b);
    if(ia<0||ib<0) continue;
    chungMap[ia]={partner:ib,jiB:b,type,firedEl};
    chungMap[ib]={partner:ia,jiA:a,type,firedEl};
  }

  // 합·충 상쇄 여부 체크: 같은 지지가 합과 충에 동시 개입
  const cancelled = {}; // 상쇄된 지지 위치
  for(const pos of Object.keys(hapMap)){
    const p=parseInt(pos);
    if(chungMap[p]){
      // 합과 충 동시 개입 → 상쇄 (월지 개입 합이면 합 우선, 아니면 서로 약화)
      const isMolJi = p===1 || chungMap[p].partner===1;
      if(isMolJi || hapMap[p].priority>=2.5){
        // 합 우선 → 충 무력화
        cancelled[p]='chung_cancelled';
        cancelled[chungMap[p].partner]='chung_cancelled';
      } else {
        // 상호 상쇄
        cancelled[p]='both_cancelled';
        cancelled[chungMap[p].partner]='both_cancelled';
        if(hapMap[p].partner!=null){
          cancelled[hapMap[p].partner]='both_cancelled';
        }
      }
    }
  }

  return { hapMap, chungMap, cancelled, jiList, ganList };
}

// 대운 개입으로 인한 원국 변화 활성화 분석
function analyzeDwActivation(origAnalysis, dwG, dwJ) {
  const { hapMap, chungMap, cancelled, jiList, ganList } = origAnalysis;
  const activations = []; // {type, description, affectedPositions, newEl}

  // ── 대운 지지가 원국 합·충에 개입 ──

  // 1. 원국에서 상쇄된 충이 있는데 대운지지가 합 쪽에 가담 → 충 활성화
  for(const [posStr, state] of Object.entries(cancelled)){
    const pos = parseInt(posStr);
    if(state!=='both_cancelled'&&state!=='chung_cancelled') continue;
    // 원국에서 충이 상쇄된 지지 - 대운지지가 그 충의 반대편과 합을 이루면?
    const chungInfo = chungMap[pos];
    if(!chungInfo) continue;
    const partnerJi = jiList[chungInfo.partner];
    // 대운지지가 충의 파트너 지지와 삼합/반합을 이루면 충 쪽이 강해져 활성화
    for(const {trio,hwEl} of SAMHAP){
      if(trio.includes(partnerJi)&&trio.includes(dwJ)){
        // 대운지지가 파트너를 강화 → 잠든 충 활성화
        activations.push({
          type:'dormant_chung_activated',
          desc:`원국 ${JH[jiList[pos]]}${JH[partnerJi]} 충이 대운 ${JH[dwJ]}의 삼합 가담으로 활성화됩니다.`,
          chungType:chungInfo.type,
          firedEl:chungInfo.firedEl,
          affectedPos:[pos,chungInfo.partner],
          chungMask:0.65
        });
      }
    }
  }

  // 2. 원국에서 상쇄된 합이 있는데 대운지지가 충 쪽에 가담 → 합 무력화(충 활성화)
  for(const [posStr, state] of Object.entries(cancelled)){
    const pos = parseInt(posStr);
    if(!hapMap[pos]) continue;
    const hwEl = hapMap[pos].hwEl;
    // 대운지지가 원국 합의 한 지지와 충을 이루면 합 깨짐
    for(const {a,b,type,firedEl} of JIJI_CHUNG){
      const partnerOfChung = (a===jiList[pos])?b:(b===jiList[pos])?a:null;
      if(partnerOfChung===null||partnerOfChung!==dwJ) continue;
      activations.push({
        type:'dormant_hap_broken',
        desc:`원국 ${JH[jiList[pos]]} 합이 대운 ${JH[dwJ]}의 충으로 깨지며 변화가 발생합니다.`,
        affectedPos:[pos],
        chungType:type,
        firedEl,
        chungMask:0.6
      });
    }
  }

  // 3. 대운지지가 원국 삼합의 나머지 1개를 완성 (반합→삼합 완성)
  for(const {trio,hwEl} of SAMHAP){
    const posInOrigin = trio.filter(j=>jiList.includes(j));
    const missing = trio.filter(j=>!jiList.includes(j));
    if(posInOrigin.length===2&&missing.length===1&&missing[0]===dwJ){
      // 대운지지로 삼합 완성!
      activations.push({
        type:'samhap_completed_by_dw',
        desc:`사주 ${JH[posInOrigin[0]]}·${JH[posInOrigin[1]]}에 대운 ${JH[dwJ]}이 가담하여 ${ENM[hwEl]} 삼합이 완성됩니다!`,
        hwEl,
        bonus:1.6 // 대운 완성 삼합은 더 강함
      });
    }
  }

  // 4. 대운 천간이 사주 천간과 새 합 형성
  const dwGEl = GEL[dwG];
  for(const {a,b,hwEl} of GAN_HAP){
    const matchGan = (dwG===a)?b:(dwG===b)?a:null;
    if(matchGan===null) continue;
    const partnPos = ganList.indexOf(matchGan);
    if(partnPos<0) continue;
    activations.push({
      type:'dw_gan_hap',
      desc:`대운 천간 ${GH[dwG]}이 사주 ${GH[matchGan]}과 천간합하여 ${ENM[hwEl]}로 화합니다.`,
      hwEl,
      affectedGanPos:partnPos
    });
  }

  // 5. 대운 천간이 사주 천간과 충 (甲庚·乙辛·丙壬·丁癸)
  const CHEON_CHUNG_PAIRS=[[0,6],[1,7],[2,8],[3,9],[4,9],[5,8]]; // 대표적 천간충
  for(const [a,b] of CHEON_CHUNG_PAIRS){
    const matchGan=(dwG===a)?b:(dwG===b)?a:null;
    if(matchGan===null) continue;
    const partnPos=ganList.indexOf(matchGan);
    if(partnPos<0) continue;
    activations.push({
      type:'dw_gan_chung',
      desc:`대운 천간 ${GH[dwG]}이 사주 ${GH[matchGan]}과 천간충하여 ${GH[matchGan]}의 힘이 약화됩니다.`,
      affectedGanPos:partnPos,
      chungMask:0.7
    });
  }

  return activations;
}

// 대운 통합 오행 계산
function calcOhaengWithDW(s, dwG, dwJ) {
  // 1. 원국 분석
  const origAnalysis = analyzeOriginalHapChung(s);
  // 2. 대운 활성화 분석
  const activations = analyzeDwActivation(origAnalysis, dwG, dwJ);

  // 3. 기본 원국 오행 계산 (대운지지를 합화 조건 검증에 포함)
  const baseScore = calcOhaeng(s, dwJ);

  // 4. 대운 글자 자체의 오행 점수 추가
  const score = [...baseScore];

  // 대운 천간 (가중치 10, 통근 체크)
  const jiListAll = [...s.map(p=>p.j), dwJ];
  const jiEffEls = new Set();
  jiListAll.forEach(j=>{
    jiEffEls.add(JEL[j]);
    JJG_DETAIL[j].forEach(g=>{if(g){const i=GH_IDX[g];if(i!=null)jiEffEls.add(GEL[i]);}});
  });
  const dwGEl = GEL[dwG];
  const dwGRooted = jiEffEls.has(dwGEl);
  score[dwGEl] += 10 * (dwGRooted ? 1.2 : 0.85);

  // 대운 지지 (가중치 16 = 월지 32.5의 약 절반)
  const dwJEl = JEL[dwJ];
  const ganElSet = new Set(s.map(p=>GEL[p.g]));
  ganElSet.add(dwGEl);
  JJG_DETAIL[dwJ].forEach((gan,ri)=>{
    if(!gan) return;
    const ganIdx=GH_IDX[gan]; if(ganIdx==null) return;
    let el=GEL[ganIdx];
    let ratio=JJG_RATIO[ri];
    if(ganElSet.has(el)) ratio*=1.2;
    score[el]+=16*ratio;
  });

  // 5. 대운 활성화로 인한 추가 조정
  for(const act of activations){
    if(act.type==='samhap_completed_by_dw'){
      // 삼합 완성: 해당 오행 추가 강화
      score[act.hwEl] += 15; // 삼합 완성 보너스
    }
    if(act.type==='dormant_chung_activated'&&act.firedEl!=null){
      // 잠든 충 활성화: 발동 오행 추가
      score[act.firedEl] += 8;
    }
    if(act.type==='dw_gan_hap'){
      // 대운 천간합: 합화 오행 추가, 원래 오행 일부 감소
      score[act.hwEl] += 6;
      const origEl=GEL[s[act.affectedGanPos]?.g??0];
      score[origEl] = Math.max(0, score[origEl]-3);
    }
    if(act.type==='dw_gan_chung'&&act.affectedGanPos!=null){
      // 대운 천간충: 해당 천간 약화
      const origEl=GEL[s[act.affectedGanPos]?.g??0];
      score[origEl] = Math.max(0, score[origEl]*0.8);
    }
  }

  return { score: score.map(v=>Math.max(0,v)), activations };
}

function toggleLeap() {

// 군시차 적용 진시 안내 (실시간 표시)
function generate(){
  const y   = parseInt(document.getElementById('yr').value) || 1990;
  const m   = parseInt(document.getElementById('mo').value) || 1;
  const d   = parseInt(document.getElementById('dy').value) || 1;
  const hrVal = document.getElementById('hr').value;
  const g   = document.getElementById('gd').value;
  const calType = document.getElementById('ct').value;
  const isLeap  = document.getElementById('leap').value === '1';

  // ── 군시차(地方時) 보정: 서울 기준 -32분 고정 ──
  // KST(동경135°기준)와 서울 실제 경도(127°) 차이: (127-135)×4 ≈ -32분
  // 진태양시 = KST - 32분 → 시지 재계산
  const LON_DIFF_MIN = -32; // 서울 고정

  // 시지 중간값(KST)으로 진태양시 시지 결정
  // 야자시·조자시는 이미 子時로 처리되므로 별도 보정 불필요
  let adjustedHrVal = hrVal;
  if (hrVal !== 'ya0' && hrVal !== 'jo0') {
    const siIdx = parseInt(hrVal); // 0=子 ~ 11=亥
    // 시지 중간 KST(분) → 진태양시(분)
    const kstMidMin  = siIdx * 120 + 60;
    const trueMidMin = ((kstMidMin + LON_DIFF_MIN + 1440) % 1440);
    const trueSi     = Math.floor(trueMidMin / 120); // 0~11
    if (trueSi !== siIdx) adjustedHrVal = String(trueSi);
  }

  const s   = saju(y, m, d, adjustedHrVal, calType, isLeap);
  const info = s.pop();
  const sol  = info._solar;
  const dwArr = dw(s, g, sol.y, sol.m, sol.d);

  // 자미두수용 음력 월/일 계산
  // 음력 입력이면 직접, 양력이면 역변환
  let zwLunarM, zwLunarD;
  if (calType === 'lunar') {
    zwLunarM = m; zwLunarD = d;
  } else {
    // 양력→음력 역산: 전년도·당해년도 모두 시도
    const targetJD = dateToJD(sol.y, sol.m, sol.d);
    zwLunarM = sol.m; zwLunarD = sol.d; // 기본값
    outer: for (const tryY of [sol.y - 1, sol.y]) {
      for (let tryM = 1; tryM <= 12; tryM++) {
        for (let tryD = 1; tryD <= 30; tryD++) {
          try {
            const t = lunarToSolar(tryY, tryM, tryD, false);
            if (t && dateToJD(t.y, t.m, t.d) === targetJD) {
              zwLunarM = tryM; zwLunarD = tryD; break outer;
            }
          } catch(e) {}
        }
      }
    }
  }

  // 보정 필요 여부: 음력1월이고 입춘 전 출생인 경우
  // 입춘 전 = 사주 연간이 전년도 간지인 경우 (이미 yearGan으로 판별 가능)
  // 음력1월 출생이면 설날 기준으로 새 연간 → 사주연간+1
  // 단, 입춘 후이면 사주연간=당해년도 이미 맞으므로 보정불필요
  let isLunarM1;
  if (calType === 'lunar') {
    // 음력 입력: 음1월이고 입춘 전(양력 sol.m=1 또는 sol.m=2,sol.d<4)이면 보정
    isLunarM1 = zwLunarM === 1 && (sol.m === 1 || (sol.m === 2 && sol.d < 4));
  } else {
    // 양력 입력: 역변환된 음력월이 1이고 입춘 전이면 보정
    isLunarM1 = zwLunarM === 1 && (sol.m === 1 || (sol.m === 2 && sol.d < 4));
  }

  const zp = calcZiwei2(sol.y, zwLunarM, zwLunarD, parseInt(hrVal)||0, g, s, isLunarM1);

  const cy = new Date().getFullYear();
  const curDw = dwArr.find(d=>cy>=d.sy&&cy<d.sy+10)||dwArr[0];

  // 대운 통합 오행 계산 (5주법)
  const { score, activations } = calcOhaengWithDW(s, curDw.g, curDw.j);

  if (calType==='lunar'){
    const note=info._yaJasi?' (야자시 적용)':info._joJasi?' (조자시 적용)':'';
    console.log(`음력 ${y}/${m}/${d} → 양력 ${sol.y}/${sol.m}/${sol.d}${note}`);
  }
  if(activations.length>0){
    console.log('대운 활성화 이벤트:', activations.map(a=>a.desc));
  }

  renderMs(s);
  renderDw(dwArr);
  renderOh(score);
  // 전역 변수 저장 (세운 해석용)
  window._geok = calcGeokgukAll(s, score);
  window._score = score;
  window._saju = s;
  renderZw(zp, s, dwArr, sol.y, sol.m, sol.d, parseInt(adjustedHrVal)||0, g, parseInt(hrVal)||0);
  renderYongshin(s, score, curDw, activations);
  renderSy(s, dwArr, zp.palaces||[], score, g, y);
  document.getElementById('result').style.display = 'block';
  document.getElementById('result').scrollIntoView({behavior:'smooth', block:'start'});
}
function swTab(n,el){
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  document.querySelectorAll('.panel').forEach(p=>p.classList.remove('active'));
  el.classList.add('active');
  document.getElementById('p-'+n).classList.add('active');
}

// 초기 실행
toggleLeap();
</script>
